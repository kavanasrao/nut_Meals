x-finance-env: &finance-env
  FINANCE_ENV: local
  FINANCE_DATABASE_URL: postgresql+asyncpg://finance:finance@finance-db:5432/finance_db
  FINANCE_DATABASE_URL_SYNC: postgresql+psycopg2://finance:finance@finance-db:5432/finance_db
  FINANCE_REDIS_URL: redis://finance-redis:6379/0
  FINANCE_CELERY_BROKER_URL: redis://finance-redis:6379/1
  FINANCE_CELERY_RESULT_BACKEND: redis://finance-redis:6379/2
  # Local-only secret; production secrets come from OCI Vault via the deploy pipeline.
  FINANCE_JWT_SECRET_KEY: ${FINANCE_JWT_SECRET_KEY:-local-dev-secret-change-me}
  FINANCE_FORCE_HTTPS: "false"

services:
  finance-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_db
    ports:
      - "5433:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finance-net

  finance-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-net

  finance-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *finance-env
    depends_on:
      finance-db:
        condition: service_healthy
      finance-redis:
        condition: service_healthy
    networks:
      - finance-net
      - nutmeals-shared-net
    restart: unless-stopped

  finance-celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO", "--concurrency=4"]
    environment:
      <<: *finance-env
      SKIP_MIGRATIONS: "true"  # migrations already applied by finance-api on startup
    depends_on:
      finance-db:
        condition: service_healthy
      finance-redis:
        condition: service_healthy
      finance-api:
        condition: service_started
    networks:
      - finance-net
    restart: unless-stopped

  finance-celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=INFO"]
    environment:
      <<: *finance-env
      SKIP_MIGRATIONS: "true"
    depends_on:
      finance-db:
        condition: service_healthy
      finance-redis:
        condition: service_healthy
      finance-api:
        condition: service_started
    networks:
      - finance-net
    restart: unless-stopped

volumes:
  finance_db_data:

networks:
  finance-net:
    driver: bridge
  # Shared overlay network for cross-service calls in local dev (e.g. this
  # service calling the Orders service). In staging/production this is
  # replaced by the platform's service mesh / k8s DNS.
  nutmeals-shared-net:
    external: true
    name: nutmeals-shared-net
