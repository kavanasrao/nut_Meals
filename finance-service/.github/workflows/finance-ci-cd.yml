name: Finance Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/finance-service/**"
      - ".github/workflows/finance-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/finance-service/**"
      - ".github/workflows/finance-ci-cd.yml"

defaults:
  run:
    working-directory: services/finance-service

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nutmeals-finance-service
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/finance-service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: mypy type-check
        run: mypy app --ignore-missing-imports
        continue-on-error: true # non-blocking during initial rollout; tighten once the codebase is fully typed

  # ---------------------------------------------------------------------
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      FINANCE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/finance_test_db
      FINANCE_DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/finance_test_db
      FINANCE_REDIS_URL: redis://localhost:6379/0
      FINANCE_CELERY_BROKER_URL: redis://localhost:6379/1
      FINANCE_CELERY_RESULT_BACKEND: redis://localhost:6379/2
      FINANCE_JWT_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/finance-service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Alembic migrations against test DB
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: finance-service-coverage
          path: services/finance-service/coverage.xml

      - name: Publish coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          rate = float(root.attrib['line-rate']) * 100
          print(f'**Line coverage: {rate:.2f}%** (threshold: 80%)')
          " >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------
  build-and-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: services/finance-service
          file: services/finance-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  deploy:
    name: Deploy Finance service
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OCI (Container Instances / OKE)
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: |
          echo "Deploying ghcr.io image sha-${GITHUB_SHA::7} to the finance-service workload."
          echo "Actual rollout is executed by the platform's shared deploy script"
          echo "(ops/deploy.sh finance-service <image-tag>), which:"
          echo "  1. Pulls secrets from OCI Vault into the workload's env"
          echo "  2. Runs 'alembic upgrade head' as a pre-deploy migration job"
          echo "  3. Performs a rolling update of the finance-api/worker/beat deployments"
          # ./ops/deploy.sh finance-service "sha-${GITHUB_SHA::7}"
