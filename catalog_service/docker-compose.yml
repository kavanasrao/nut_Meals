version: "3.9"

x-common-env: &common-env
  CATALOG_DATABASE_URL: postgresql+asyncpg://catalog:catalog@db:5432/catalog_db
  CATALOG_REDIS_URL: redis://redis:6379/0
  CATALOG_CELERY_BROKER_URL: redis://redis:6379/1
  CATALOG_CELERY_RESULT_BACKEND: redis://redis:6379/2
  CATALOG_ENVIRONMENT: local
  CATALOG_FORCE_HTTPS: "false"
  # NOTE: local-only default; real deployments inject this from OCI Vault.
  CATALOG_JWT_SECRET_KEY: local-dev-secret-do-not-use-in-prod
  CATALOG_INVENTORY_SERVICE_URL: http://inventory-service:8000

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    environment: *common-env
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  api:
    build: .
    environment: *common-env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      [
        "uvicorn", "app.main:app",
        "--host", "0.0.0.0", "--port", "8000", "--reload"
      ]
    volumes:
      - ./app:/app/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment: *common-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=INFO"]

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment: *common-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "beat", "--loglevel=INFO"]

volumes:
  catalog_db_data:
