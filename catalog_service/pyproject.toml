[tool.ruff]
line-length = 110
target-version = "py312"
exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["B008"]  # allow FastAPI's Depends() in argument defaults

[tool.coverage.run]
source = ["app"]
omit = ["app/tasks/celery_app.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
