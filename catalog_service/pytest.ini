[tool:pytest]
asyncio_mode = auto
testpaths = tests
addopts = --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80
env =
    CATALOG_DATABASE_URL=postgresql+asyncpg://catalog:catalog@localhost:5432/catalog_test_db
    CATALOG_JWT_SECRET_KEY=test-secret-key-not-for-production
    CATALOG_ENVIRONMENT=local
    CATALOG_FORCE_HTTPS=false
