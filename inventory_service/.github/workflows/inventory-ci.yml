name: Inventory Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "services/inventory/**"
      - ".github/workflows/inventory-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/inventory/**"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nutmeals-inventory-service
  WORKING_DIR: services/inventory

jobs:
  # ---------------------------------------------------------------------
  # Lint + type-check
  # ---------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: mypy app --ignore-missing-imports

  # ---------------------------------------------------------------------
  # Unit + integration tests with coverage reporting
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventory
          POSTGRES_PASSWORD: inventory
          POSTGRES_DB: inventory_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql+asyncpg://inventory:inventory@localhost:5432/inventory_test
      DATABASE_URL_SYNC: postgresql+psycopg2://inventory:inventory@localhost:5432/inventory_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET_KEY: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - name: Run Alembic migrations against test DB
        run: alembic upgrade head
      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ env.WORKING_DIR }}/coverage.xml
          flags: inventory-service
          fail_ci_if_error: false
      - name: Publish coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY || true

  # ---------------------------------------------------------------------
  # Multi-arch Docker build (AMD64 + ARM64), pushed on main/develop only
  # ---------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (API image)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (worker image)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          target: worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # Deploy (main branch only) — placeholder invoking your infra tooling.
  # Secrets (DB creds, JWT signing key, registry creds) are pulled from
  # OCI Vault by the deploy step, never stored in this repo or as raw
  # GitHub secrets where avoidable.
  # ---------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Fetch deployment secrets from OCI Vault
        run: |
          echo "Fetching secrets via OCI CLI (configured with workload identity)..."
          # oci vault secret get-secret-bundle --secret-id $INVENTORY_DB_SECRET_OCID \
          #   --query 'data."secret-bundle-content".content' --raw-output | base64 -d
        env:
          OCI_CLI_AUTH: instance_principal

      - name: Deploy Inventory Service
        run: |
          echo "Triggering rollout of ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          # e.g. kubectl set image deployment/inventory-api inventory=$IMAGE_NAME:$GITHUB_SHA
          # or: oci ce cluster ... / terraform apply -target=module.inventory_service

      - name: Run database migrations
        run: |
          echo "Running: alembic upgrade head against production DB (via migration Job)"
