version: "3.9"

# Local dev stack for the Inventory microservice. In the broader nut_Meals
# system, other services (Orders, Catalog, etc.) run as siblings with their
# own compose files / a top-level compose that includes this one.

x-inventory-env: &inventory-env
  ENV: development
  DATABASE_URL: postgresql+asyncpg://inventory:inventory@inventory-db:5432/inventory_db
  DATABASE_URL_SYNC: postgresql+psycopg2://inventory:inventory@inventory-db:5432/inventory_db
  REDIS_URL: redis://inventory-redis:6379/0
  CELERY_BROKER_URL: redis://inventory-redis:6379/1
  CELERY_RESULT_BACKEND: redis://inventory-redis:6379/2
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-secret-do-not-use-in-prod}
  FORCE_HTTPS: "false"
  ORDERS_SERVICE_BASE_URL: http://orders-service:8000

services:
  inventory-api:
    build:
      context: .
      target: runtime
    ports:
      - "8001:8000"
    environment: *inventory-env
    depends_on:
      inventory-db:
        condition: service_healthy
      inventory-redis:
        condition: service_started
    volumes:
      - ./app:/app/app  # live-reload friendly for local dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  inventory-worker:
    build:
      context: .
      target: worker
    environment: *inventory-env
    depends_on:
      - inventory-db
      - inventory-redis

  inventory-beat:
    build:
      context: .
      target: beat
    environment: *inventory-env
    depends_on:
      - inventory-db
      - inventory-redis

  inventory-migrate:
    build:
      context: .
      target: runtime
    environment: *inventory-env
    depends_on:
      inventory-db:
        condition: service_healthy
    entrypoint: ["alembic", "upgrade", "head"]

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventory-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  inventory_db_data:
