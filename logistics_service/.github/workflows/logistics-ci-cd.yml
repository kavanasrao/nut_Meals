name: Logistics Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/logistics/**"
      - ".github/workflows/logistics-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/logistics/**"
      - ".github/workflows/logistics-ci-cd.yml"

defaults:
  run:
    working-directory: services/logistics

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nut-meals-logistics-service
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check app tests
      - name: Mypy type check
        run: mypy app --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing \
                 --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/logistics/coverage.xml
      - name: Publish coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: services/logistics/coverage.xml
          flags: logistics-service
          fail_ci_if_error: false

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image (API)
        uses: docker/build-push-action@v6
        with:
          context: services/logistics
          file: services/logistics/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push multi-arch image (worker)
        uses: docker/build-push-action@v6
        with:
          context: services/logistics
          file: services/logistics/Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}-worker:latest
            ${{ env.IMAGE_NAME }}-worker:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy Logistics Service
        run: |
          echo "Trigger deployment (e.g. kubectl rollout, ArgoCD sync, or OCI"
          echo "Container Instances update) using image tag ${{ needs.build-and-push.result }}."
          echo "Secrets (DB creds, carrier API tokens, JWT public key) are"
          echo "injected at deploy time from OCI Vault -- never baked into the image."
        # Replace with real deploy step, e.g.:
        # - uses: azure/k8s-deploy@v5 / oracle-actions/... / argocd sync, etc.
