# docker-compose.test.yml
#
# Minimal Postgres + Redis for running the test suite, matching
# TEST_DATABASE_URL / REDIS_URL defaults in tests/conftest.py and CI.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest
#   docker compose -f docker-compose.test.yml down -v

version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nutmeals
      POSTGRES_PASSWORD: nutmeals
      POSTGRES_DB: security_db_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutmeals -d security_db_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
