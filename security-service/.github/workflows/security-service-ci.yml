name: Security Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "security-service/**"
      - ".github/workflows/security-service-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "security-service/**"
      - ".github/workflows/security-service-ci.yml"

defaults:
  run:
    working-directory: security-service

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nutmeals-security-service

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install ruff black
      - name: Ruff
        run: ruff check .
      - name: Black (check only)
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nutmeals
          POSTGRES_PASSWORD: nutmeals
          POSTGRES_DB: security_db_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd="pg_isready -U nutmeals -d security_db_test"
          --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://nutmeals:nutmeals@localhost:5433/security_db_test
      SECURITY_REDIS_URL: redis://localhost:6380/0
      SECURITY_JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: security-service/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alembic migrations against test DB
        run: alembic upgrade head
        env:
          SECURITY_DATABASE_URL: postgresql+asyncpg://nutmeals:nutmeals@localhost:5433/security_db_test
      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: security-service/coverage.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: security-service
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy Security Service
        run: |
          echo "Triggering deployment of ${{ env.IMAGE_NAME }} to the security-service target."
          echo "Replace this step with your actual deploy mechanism (e.g. OCI OKE rollout restart,"
          echo "ArgoCD sync, or a Terraform/Helm apply) -- kept as a placeholder here since the"
          echo "deployment target is infrastructure-specific."
        env:
          OCI_VAULT_SECRET_OCID: ${{ secrets.OCI_VAULT_SECRET_OCID }}
