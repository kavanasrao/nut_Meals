version: "3.9"

# Local dev stack for the SEO microservice. In the broader nut_Meals
# platform, this file is included alongside the other services' compose
# files via `docker-compose -f docker-compose.yml -f ../catalog/docker-compose.yml ...`
# or merged into a root-level compose file. Kept standalone here so the
# SEO service can be run/tested in isolation with stub upstreams.

services:
  seo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_pass
      POSTGRES_DB: seo_service_db
    ports:
      - "5433:5432"
    volumes:
      - seo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  seo-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  seo-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      SEO_ENV: development
      SEO_HTTPS_ONLY: "false"
      SEO_DATABASE_URL: postgresql+asyncpg://seo_user:seo_pass@seo-db:5432/seo_service_db
      SEO_REDIS_URL: redis://seo-redis:6379/0
      SEO_CELERY_BROKER_URL: redis://seo-redis:6379/1
      SEO_CELERY_RESULT_BACKEND: redis://seo-redis:6379/2
      SEO_CATALOG_SERVICE_URL: http://catalog-service:8000
      SEO_REVIEWS_SERVICE_URL: http://reviews-service:8000
      SEO_BLOG_SERVICE_URL: http://blog-service:8000
      SEO_PUBLIC_BASE_URL: http://localhost:8004
      SEO_JWT_PUBLIC_KEY: ${SEO_JWT_PUBLIC_KEY:-dev-only-placeholder}
    depends_on:
      seo-db:
        condition: service_healthy
      seo-redis:
        condition: service_healthy
    volumes:
      - ai_exports:/data/ai-exports
    networks:
      - default
      - nut_meals_net

  seo-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      SEO_ENV: development
      SEO_DATABASE_URL: postgresql+asyncpg://seo_user:seo_pass@seo-db:5432/seo_service_db
      SEO_REDIS_URL: redis://seo-redis:6379/0
      SEO_CELERY_BROKER_URL: redis://seo-redis:6379/1
      SEO_CELERY_RESULT_BACKEND: redis://seo-redis:6379/2
      SEO_CATALOG_SERVICE_URL: http://catalog-service:8000
      SEO_REVIEWS_SERVICE_URL: http://reviews-service:8000
      SEO_BLOG_SERVICE_URL: http://blog-service:8000
    depends_on:
      seo-db:
        condition: service_healthy
      seo-redis:
        condition: service_healthy
    volumes:
      - ai_exports:/data/ai-exports
    networks:
      - default
      - nut_meals_net

  seo-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      SEO_ENV: development
      SEO_DATABASE_URL: postgresql+asyncpg://seo_user:seo_pass@seo-db:5432/seo_service_db
      SEO_REDIS_URL: redis://seo-redis:6379/0
      SEO_CELERY_BROKER_URL: redis://seo-redis:6379/1
      SEO_CELERY_RESULT_BACKEND: redis://seo-redis:6379/2
    depends_on:
      seo-db:
        condition: service_healthy
      seo-redis:
        condition: service_healthy
    networks:
      - default
      - nut_meals_net

volumes:
  seo_db_data:
  ai_exports:

networks:
  # External network shared with other nut_Meals microservices
  # (catalog-service, reviews-service, blog-service) for local dev.
  nut_meals_net:
    external: true
    name: nut_meals_net
