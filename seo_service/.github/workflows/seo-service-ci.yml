name: SEO Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "services/seo-service/**"
      - ".github/workflows/seo-service-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/seo-service/**"

defaults:
  run:
    working-directory: services/seo-service

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nutmeals-seo-service

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff black
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: seo_user
          POSTGRES_PASSWORD: seo_pass
          POSTGRES_DB: seo_service_db_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U seo_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/seo-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations against test DB
        env:
          SEO_DATABASE_URL: postgresql+asyncpg://seo_user:seo_pass@localhost:5432/seo_service_db_test
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          SEO_DATABASE_URL: sqlite+aiosqlite:///:memory:
          SEO_ENV: test
          SEO_JWT_PUBLIC_KEY: test-secret-not-real
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/seo-service/coverage.xml

      - name: Publish coverage summary
        if: always()
        run: |
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          rate = float(root.attrib['line-rate']) * 100
          print(f'Line coverage: {rate:.1f}%')
          " >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: services/seo-service
          file: services/seo-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Fetch deploy secrets from OCI Vault
        env:
          OCI_VAULT_SECRET_ID: ${{ secrets.OCI_VAULT_SECRET_ID }}
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
        run: |
          echo "Deployment pulls runtime secrets (DB creds, JWT public key,"
          echo "AI export signing secret) from OCI Vault at container start —"
          echo "no plaintext secrets are baked into the image or this workflow."

      - name: Deploy SEO service (rolling update)
        run: |
          echo "Trigger orchestration platform (e.g. OKE/K8s) rollout for"
          echo "${{ env.IMAGE_NAME }}:$(echo ${{ github.sha }} | cut -c1-12)"
          # kubectl set image deployment/seo-service seo-service=${{ env.IMAGE_NAME }}:sha-${{ github.sha }} -n nutmeals
          # kubectl rollout status deployment/seo-service -n nutmeals
