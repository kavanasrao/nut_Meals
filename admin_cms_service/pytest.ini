[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80
env =
    ADMIN_CMS_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/admin_cms_test
    ADMIN_CMS_ENVIRONMENT=test
    ADMIN_CMS_JWT_PUBLIC_KEY=test-secret-not-real
    ADMIN_CMS_JWT_ALGORITHM=HS256

; Note: models use native Postgres types (UUID, JSONB, ARRAY, INET), so
; tests run against a real (ephemeral) Postgres instance rather than
; SQLite. docker-compose.yml provides a `db-test` service on port 5433
; for local runs; CI spins up a `postgres:16` service container (see
; .github/workflows/admin-cms-ci.yml).
