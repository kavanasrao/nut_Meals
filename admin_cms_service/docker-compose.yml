name: nut-meals-admin-cms

services:
  admin-cms-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      ADMIN_CMS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/admin_cms
      ADMIN_CMS_REDIS_URL: redis://redis:6379/0
      ADMIN_CMS_CELERY_BROKER_URL: redis://redis:6379/1
      ADMIN_CMS_CELERY_RESULT_BACKEND: redis://redis:6379/2
      ADMIN_CMS_ENVIRONMENT: development
      ADMIN_CMS_JWT_PUBLIC_KEY: ${ADMIN_CMS_JWT_PUBLIC_KEY:-dev-only-not-a-real-key}
      ADMIN_CMS_JWT_ALGORITHM: RS256
      ADMIN_CMS_FINANCE_SERVICE_URL: http://finance-service:8000
      ADMIN_CMS_ORDERS_SERVICE_URL: http://orders-service:8000
      ADMIN_CMS_LOGISTICS_SERVICE_URL: http://logistics-service:8000
      ADMIN_CMS_PAYMENTS_SERVICE_URL: http://payments-service:8000
      ADMIN_CMS_INVENTORY_SERVICE_URL: http://inventory-service:8000
      ADMIN_CMS_INTERNAL_SERVICE_TOKEN: ${ADMIN_CMS_INTERNAL_SERVICE_TOKEN:-dev-only-shared-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nut-meals-net

  admin-cms-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      ADMIN_CMS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/admin_cms
      ADMIN_CMS_REDIS_URL: redis://redis:6379/0
      ADMIN_CMS_CELERY_BROKER_URL: redis://redis:6379/1
      ADMIN_CMS_CELERY_RESULT_BACKEND: redis://redis:6379/2
      ADMIN_CMS_FINANCE_SERVICE_URL: http://finance-service:8000
      ADMIN_CMS_ORDERS_SERVICE_URL: http://orders-service:8000
      ADMIN_CMS_LOGISTICS_SERVICE_URL: http://logistics-service:8000
      ADMIN_CMS_PAYMENTS_SERVICE_URL: http://payments-service:8000
      ADMIN_CMS_INVENTORY_SERVICE_URL: http://inventory-service:8000
      ADMIN_CMS_INTERNAL_SERVICE_TOKEN: ${ADMIN_CMS_INTERNAL_SERVICE_TOKEN:-dev-only-shared-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nut-meals-net

  admin-cms-beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      ADMIN_CMS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/admin_cms
      ADMIN_CMS_REDIS_URL: redis://redis:6379/0
      ADMIN_CMS_CELERY_BROKER_URL: redis://redis:6379/1
      ADMIN_CMS_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nut-meals-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_cms
    ports:
      - "5432:5432"
    volumes:
      - admin_cms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nut-meals-net

  # Ephemeral Postgres instance used only by the test suite (pytest.ini
  # points ADMIN_CMS_DATABASE_URL at this when running tests locally).
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_cms_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nut-meals-net
    profiles: ["test"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nut-meals-net

networks:
  nut-meals-net:
    driver: bridge
    external: false

volumes:
  admin_cms_db_data:
