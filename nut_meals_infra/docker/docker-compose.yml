version: "3.9"

# nut_Meals Infra Service — local development stack
# Usage: docker compose -f docker/docker-compose.yml up --build

x-common-env: &common-env
  ENVIRONMENT: development
  DEBUG: "true"
  SECRET_KEY: dev-secret-key-change-in-prod
  INTERNAL_API_KEY: dev-internal-key
  DATABASE_URL: postgresql+asyncpg://infra:infra@postgres:5432/infra_db
  REDIS_URL: redis://redis:6379/3
  CELERY_BROKER_URL: redis://redis:6379/3
  CELERY_RESULT_BACKEND: redis://redis:6379/3
  BACKUP_DB_TARGETS: "orders=postgresql://orders:orders@postgres:5432/orders_db,users=postgresql://users:users@postgres:5432/users_db"
  BACKUP_ENCRYPTION_KEY: "aaaabbbbccccddddeeeeffffgggghhhh"  # 32 chars — replace in prod
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET_NAME: nut-meals-backups
  S3_REGION: us-east-1
  BACKUP_RETENTION_DAYS: "30"
  BACKUP_SCHEDULE_CRON: "*/5 * * * *"  # Every 5 min for dev testing

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        APP_VERSION: "dev"
        GIT_SHA: "local"
    image: nut-meals/infra-service:dev
    container_name: infra-api
    ports:
      - "8005:8000"
    environment: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/app/app:ro    # hot-reload in dev
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: celery-worker
      args:
        APP_VERSION: "dev"
    image: nut-meals/infra-service:dev
    container_name: infra-worker
    environment: *common-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: celery-beat
      args:
        APP_VERSION: "dev"
    image: nut-meals/infra-service:dev
    container_name: infra-beat
    environment: *common-env
    depends_on:
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: infra-postgres
    environment:
      POSTGRES_USER: infra
      POSTGRES_PASSWORD: infra
      POSTGRES_DB: infra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infra -d infra_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: infra-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: infra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO console
    restart: unless-stopped

  # Auto-create bucket in MinIO on startup
  minio-setup:
    image: minio/mc:latest
    container_name: infra-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/nut-meals-backups;
        mc policy set none local/nut-meals-backups;
        echo 'MinIO bucket ready';
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
