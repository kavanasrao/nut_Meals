# Nutmeals — Complete Microservices Docker Compose
#
# Services:
#   Infrastructure : postgres (16), redis (7)
#   api-gateway    : port 8000 — single client entry point
#   user-service   : port 8005
#   meal-service   : port 8006
#   order-service  : port 8001
#   payment-service: port 8002
#   notification-service: port 8003
#   delivery-service: port 8004
#   admin-service  : port 8007
#
# Quick start:
#   docker compose up --build
#   docker compose exec admin-service python scripts/seed_superadmin.py

version: "3.9"

x-common-env: &common-env
  ENVIRONMENT: local
  DEBUG: "true"
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: super_secret_jwt_key_change_in_production
  JWT_ALGORITHM: HS256

services:

  ####################################################
  # Infrastructure
  ####################################################

  postgres:
    image: postgres:16-alpine
    container_name: nutmeals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kanni3750
      POSTGRES_DB: nutmeals_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - nutmeals-network

  redis:
    image: redis:7-alpine
    container_name: nutmeals-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - nutmeals-network

  ####################################################
  # API Gateway
  ####################################################

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      SERVICE_NAME: api-gateway

      USER_SERVICE_URL: http://user-service:8005
      ORDER_SERVICE_URL: http://order-service:8001
      PAYMENT_SERVICE_URL: http://payment-service:8002
      DELIVERY_SERVICE_URL: http://delivery-service:8004
      MEAL_SERVICE_URL: http://meal-service:8006
      NOTIFICATION_SERVICE_URL: http://notification-service:8003

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nutmeals-network

  ####################################################
  # User Service
  ####################################################

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      SERVICE_NAME: user-service
      DATABASE_URL: postgresql+asyncpg://postgres:kanni3750@postgres:5432/nutmeals_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nutmeals-network

  ####################################################
  # Order Service
  ####################################################

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
